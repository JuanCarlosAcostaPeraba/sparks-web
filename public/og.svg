<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">sparks — local-first CLI</title>
  <desc id="description">A social card showing sparks commands and nested ideas in a terminal.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="760" y1="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4dec7" />
      <stop offset=".45" stop-color="#f7f6f1" />
      <stop offset="1" stop-color="#eef3e9" />
    </linearGradient>
  </defs>
  <path fill="#f7f6f1" d="M0 0h1200v630H0z" />
  <path fill="url(#background)" d="M0 0h1200v630H0z" opacity=".55" />
  <g transform="translate(64 172)">
    <text y="74" fill="#15130f" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="900">sparks</text>
    <text y="132" fill="#464139" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600">Local-first CLI for ideas,</text>
    <text y="170" fill="#464139" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600">tasks, and nested thoughts.</text>
    <text y="222" fill="#9a4f12" font-family="SFMono-Regular, Menlo, monospace" font-size="18" font-weight="800">fast · native · scriptable</text>
    <text y="275" fill="#57534e" font-family="SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700">github.com/JuanCarlosAcostaPeraba/sparks-cli</text>
  </g>
  <g transform="translate(535 119)">
    <rect width="601" height="392" fill="#171717" rx="8" />
    <rect width="601" height="43" fill="#242424" rx="8" />
    <path fill="#242424" d="M0 35h601v8H0z" />
    <circle cx="23" cy="22" r="6" fill="#ff605c" />
    <circle cx="42" cy="22" r="6" fill="#ffbd44" />
    <circle cx="61" cy="22" r="6" fill="#00ca4e" />
    <g fill="#f4f0e8" font-family="SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700">
      <text x="30" y="94" fill="#64d67a">$</text>
      <text x="58" y="94">sparks add "Ship the CLI"</text>
      <text x="30" y="128">Added spark 1</text>
      <text x="30" y="162" fill="#64d67a">$</text>
      <text x="58" y="162">sparks add --parent 1 "Write docs"</text>
      <text x="30" y="196">Added spark 2</text>
      <text x="30" y="230" fill="#64d67a">$</text>
      <text x="58" y="230">sparks tree</text>
      <text x="30" y="264">└─ [!] 1) Ship the CLI</text>
      <text x="68" y="298">└─ [ ] 1.1) Write docs</text>
      <text x="30" y="364" fill="#9d988c"># local SQLite, JSON when needed</text>
    </g>
  </g>
</svg>
